apiVersion: apps/v1
kind: Deployment
metadata:
  name: tf-web-whatsapp-contact
  labels:
    app.kubernetes.io/name: tf-web-whatsapp-contact
    app.kubernetes.io/part-of: tf-web-whatsapp-contact
    app.kubernetes.io/environment: prod
spec:
  replicas: 1
  strategy:
    type: Recreate
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: tf-web-whatsapp-contact
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tf-web-whatsapp-contact
        app.kubernetes.io/part-of: tf-web-whatsapp-contact
        app.kubernetes.io/environment: prod
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: web
          image: tf_web_whatsapp_contact:bootstrap
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8003
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: app-config
              mountPath: /app/server/config/default.json
              subPath: default.json
              readOnly: true
            - name: whatsapp-data
              mountPath: /app/storage
      volumes:
        - name: app-config
          secret:
            secretName: tf-web-whatsapp-contact-config
        - name: whatsapp-data
          persistentVolumeClaim:
            claimName: tf-web-whatsapp-contact-data
