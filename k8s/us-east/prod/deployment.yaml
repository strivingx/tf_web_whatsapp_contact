apiVersion: apps/v1
kind: Deployment
metadata:
  name: tf-web-whatsapp-contact
  labels:
    app.kubernetes.io/name: tf-web-whatsapp-contact
    app.kubernetes.io/part-of: tf-web-whatsapp-contact
    app.kubernetes.io/environment: prod
spec:
  replicas: 1
  strategy:
    type: Recreate
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: tf-web-whatsapp-contact
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tf-web-whatsapp-contact
        app.kubernetes.io/part-of: tf-web-whatsapp-contact
        app.kubernetes.io/environment: prod
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: web
          image: tf_web_whatsapp_contact:bootstrap
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8003
          readinessProbe:
            httpGet:
              path: /wa/manager/api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /wa/manager/api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          envFrom:
            - secretRef:
                name: tf-web-whatsapp-contact-secrets
          volumeMounts:
            - name: whatsapp-data
              mountPath: /app/storage
      volumes:
        - name: whatsapp-data
          persistentVolumeClaim:
            claimName: tf-web-whatsapp-contact-data
