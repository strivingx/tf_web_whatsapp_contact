apiVersion: v1
kind: Secret
metadata:
  name: tf-web-whatsapp-contact-config
type: Opaque
stringData:
  default.json: |
    {
      "server": {
        "port": 8003,
        "sessionSecret": "replace-with-a-long-random-secret"
      },
      "database": {
        "host": "replace-with-rds-private-endpoint",
        "port": 3306,
        "user": "replace-with-rds-user",
        "password": "replace-with-rds-password",
        "database": "whatsapp_contact",
        "connectionLimit": 10
      },
      "admin": {
        "username": "admin",
        "password": "replace-with-initial-admin-password"
      },
      "whatsapp": {
        "authDataPath": "/app/storage/baileys_auth",
        "syncFullHistory": true,
        "logLevel": "warn",
        "reconnectBaseDelayMs": 1000,
        "reconnectMaxDelayMs": 30000,
        "historyRequestTimeoutMs": 15000,
        "mock": false
      },
      "sending": {
        "defaultIntervalMs": 5000,
        "minIntervalMs": 2000,
        "dailyLimit": 80,
        "retryLimit": 1
      },
      "history": {
        "windowDays": 30,
        "initialSyncLimit": 100,
        "olderSyncLimit": 50
      },
      "leadScoring": {
        "enabled": false,
        "baseUrl": "https://api.openai.com/v1",
        "apiKey": "",
        "model": "gpt-4o-mini",
        "timeoutMs": 15000,
        "maxMessages": 40,
        "maxTranscriptChars": 12000,
        "debounceMs": 5000
      }
    }
