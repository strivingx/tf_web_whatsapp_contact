apiVersion: v1
kind: Secret
metadata:
  name: tf-web-whatsapp-contact-secrets
type: Opaque
stringData:
  SESSION_SECRET: replace-with-a-long-random-secret
  DB_HOST: replace-with-rds-private-endpoint
  DB_PORT: "3306"
  DB_USER: replace-with-rds-user
  DB_PASSWORD: replace-with-rds-password
  DB_NAME: whatsapp_contact
  DB_CONNECTION_LIMIT: "10"
  ADMIN_USERNAME: admin
  ADMIN_PASSWORD: replace-with-initial-admin-password
  WHATSAPP_AUTH_DATA_PATH: /app/storage/baileys_auth
  WHATSAPP_SYNC_FULL_HISTORY: "true"
  WHATSAPP_LOG_LEVEL: warn
  WHATSAPP_RECONNECT_BASE_DELAY_MS: "1000"
  WHATSAPP_RECONNECT_MAX_DELAY_MS: "30000"
  WHATSAPP_HISTORY_REQUEST_TIMEOUT_MS: "15000"
  WHATSAPP_MOCK: "false"
  SENDING_DEFAULT_INTERVAL_MS: "5000"
  SENDING_MIN_INTERVAL_MS: "2000"
  SENDING_DAILY_LIMIT: "80"
  SENDING_RETRY_LIMIT: "1"
  HISTORY_WINDOW_DAYS: "30"
  HISTORY_INITIAL_SYNC_LIMIT: "100"
  HISTORY_OLDER_SYNC_LIMIT: "50"
  LEAD_SCORING_ENABLED: "false"
